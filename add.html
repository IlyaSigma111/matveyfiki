<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить фанфик - Матвейфики</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-dark: #0a0a0f;
            --accent: #ff2d75;
            --accent2: #7b2dff;
            --accent3: #00d4ff;
            --text: #ffffff;
            --text-muted: #8a8a9a;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(123, 45, 255, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 45, 117, 0.2) 0%, transparent 50%);
        }

        nav {
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 3rem;
            background: linear-gradient(135deg, var(--accent), var(--accent3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 1.2rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: var(--text);
            font-size: 1.1rem;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 40px rgba(255, 45, 117, 0.3);
        }

        .form-group textarea {
            min-height: 300px;
            resize: vertical;
            line-height: 1.8;
        }

        .glow-btn {
            width: 100%;
            padding: 1.2rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .glow-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 50px rgba(255, 45, 117, 0.4);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: var(--accent3);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--accent);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 1rem 3rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 15px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            opacity: 0;
            transition: all 0.4s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 768px) {
            nav { padding: 1rem; }
            h1 { font-size: 2rem; }
            .container { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>

    <nav>
        <a href="index.html" class="logo">Матвейфики</a>
    </nav>

    <div class="container">
        <a href="index.html" class="back-link">← На главную</a>
        <h1>✨ Добавить фанфик</h1>

        <form id="addForm">
            <div class="form-group">
                <label>📖 Название</label>
                <input type="text" id="title" placeholder="Введите название произведения..." required>
            </div>

            <div class="form-group">
                <label>📝 Описание</label>
                <textarea id="description" placeholder="Кратко о чём ваша история..." required></textarea>
            </div>

            <div class="form-group">
                <label>🏷️ Жанр</label>
                <input type="text" id="genre" placeholder="Фэнтези, Романтика, Драма, Приключения...">
            </div>

            <div class="form-group">
                <label>📄 Текст фанфика</label>
                <textarea id="text" placeholder="Начинайте писать вашу историю здесь...

Разделяйте абзацы пустой строкой.

Каждый новый абзац - это новый параграф в читалке." required></textarea>
            </div>

            <button type="submit" class="glow-btn">🚀 Опубликовать</button>
        </form>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx96Hahv1ytHp-3o5WWk-omLQnrbtfWsU",
            authDomain: "matveyfiki-57f7a.firebaseapp.com",
            databaseURL: "https://matveyfiki-57f7a-default-rtdb.firebaseio.com",
            projectId: "matveyfiki-57f7a",
            storageBucket: "matveyfiki-57f7a.firebasestorage.app",
            messagingSenderId: "500388540775",
            appId: "1:500388540775:web:e3596a90b34a64abdfbfc2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const showToast = (msg) => {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        };

        document.getElementById('addForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const fic = {
                title: document.getElementById('title').value.trim(),
                description: document.getElementById('description').value.trim(),
                genre: document.getElementById('genre').value.trim() || 'Без жанра',
                text: document.getElementById('text').value.trim(),
                createdAt: Date.now()
            };

            push(ref(db, 'fics'), fic).then(() => {
                showToast('✨ Фанфик успешно опубликован!');
                e.target.reset();
            }).catch(() => {
                showToast('❌ Произошла ошибка');
            });
        });
    </script>
</body>
</html>
